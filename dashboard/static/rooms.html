<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROOMs — Live Demo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d0d;
  --panel: #161616;
  --border: #252525;
  --text: #e8e8e8;
  --muted: #555;
  --accent: #6EE7B7;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Mono', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  gap: 24px;
}
header {
  display: flex;
  align-items: center;
  gap: 16px;
  width: 100%;
  max-width: 1160px;
}
header h1 {
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: 28px;
  letter-spacing: -0.5px;
  color: var(--text);
}
.tag {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  padding: 3px 8px;
  border-radius: 4px;
  border: 1px solid var(--border);
  color: var(--muted);
  text-transform: uppercase;
}
.tag.live {
  color: var(--accent);
  border-color: var(--accent);
  animation: tagPulse 2s ease-in-out infinite;
}
@keyframes tagPulse { 0%,100%{opacity:1} 50%{opacity:.5} }
.rooms-grid {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  width: 100%;
  max-width: 1160px;
}
.room-card {
  flex: 1;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.room-card-header {
  padding: 12px 16px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.room-name {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.room-role { font-size: 11px; color: var(--muted); margin-top: 1px; }
.state-badge {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: 99px;
  background: #1a1a1a;
  color: var(--muted);
  border: 1px solid var(--border);
  transition: background 0.3s, color 0.3s, border-color 0.3s;
}
.state-badge[data-state="idle"]    { color: #6EE7B7; border-color: #6EE7B7; background: rgba(110,231,183,.08); }
.state-badge[data-state="working"] { color: #FDE68A; border-color: #FDE68A; background: rgba(253,230,138,.08); }
.state-badge[data-state="error"]   { color: #F87171; border-color: #F87171; background: rgba(248,113,113,.08); }
.state-badge[data-state="offline"] { color: var(--muted); border-color: var(--border); background: transparent; }
.state-badge[data-state="clear"]   { color: #93C5FD; border-color: #93C5FD; background: rgba(147,197,253,.08); }
.state-badge[data-state="cloudy"]  { color: #CBD5E1; border-color: #CBD5E1; background: rgba(203,213,225,.08); }
.state-badge[data-state="rain"]    { color: #60A5FA; border-color: #60A5FA; background: rgba(96,165,250,.08); }
.state-badge[data-state="storm"]   { color: #C084FC; border-color: #C084FC; background: rgba(192,132,252,.08); }
.state-badge[data-state="fog"]     { color: #94A3B8; border-color: #94A3B8; background: rgba(148,163,184,.08); }
.room-svg-wrap {
  padding: 0;
  background: #111;
}
.room-svg-wrap svg {
  width: 100%;
  height: auto;
  display: block;
}
.room-log {
  padding: 10px 14px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--muted);
  min-height: 36px;
  display: flex;
  align-items: center;
  gap: 8px;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}
.room-log .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--muted);
  flex-shrink: 0;
  transition: background 0.3s;
}
.controls {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  max-width: 1160px;
}
.ctrl-btn {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--panel);
  color: var(--text);
  cursor: pointer;
  transition: border-color .2s, color .2s;
}
.ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
.ctrl-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(110,231,183,.07); }
.cycle-speed { color: var(--muted); font-size: 11px; margin-left: auto; }

/* SVG animation keyframes */
@keyframes rm-bob    { 0%,100%{transform:translateY(0)}   50%{transform:translateY(-5px)} }
@keyframes rm-blink  { 0%,85%,100%{transform:scaleY(1)}  90%,95%{transform:scaleY(0.05)} }
@keyframes rm-type-l { 0%,100%{transform:rotate(0) translate(0,0)} 50%{transform:rotate(-7deg) translate(-2px,5px)} }
@keyframes rm-type-r { 0%,100%{transform:rotate(0) translate(0,0)} 50%{transform:rotate(7deg) translate(2px,5px)} }
@keyframes rm-shake  { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-4px)} 40%{transform:translateX(4px)} 60%{transform:translateX(-3px)} 80%{transform:translateX(3px)} }
@keyframes rm-pulse  { 0%,100%{opacity:1} 50%{opacity:.2} }
@keyframes rm-steam  { 0%{transform:translateY(0);opacity:.6} 100%{transform:translateY(-14px);opacity:0} }
@keyframes rm-needle { 0%,100%{transform:rotate(-18deg) translate(0,0);transform-origin:94px 213px} 50%{transform:rotate(14deg);transform-origin:94px 213px} }
@keyframes rm-steer  { 0%,100%{transform:rotate(-6deg);transform-origin:180px 318px} 50%{transform:rotate(6deg);transform-origin:180px 318px} }
@keyframes rm-scan   { 0%,100%{opacity:.3} 50%{opacity:1} }
@keyframes rm-tail   { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(38deg)} }
@keyframes rm-sweat  { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-4px) scale(1.2)} }
@keyframes rm-rain   { 0%{transform:translateY(-10px);opacity:0} 80%{opacity:.8} 100%{transform:translateY(40px);opacity:0} }
@keyframes rm-flash  { 0%,89%,100%{opacity:0} 90%,95%{opacity:1} }
@keyframes rm-wave   { 0%{transform:translateX(0)} 100%{transform:translateX(-4px)} }

/* State-driven SVG classes */
.state-idle #head-m4, .state-idle #head-m1 { animation: rm-bob 3.2s ease-in-out infinite; transform-origin: center; }
.state-idle #eye-m4-l, .state-idle #eye-m4-r,
.state-idle #eye-m1-l, .state-idle #eye-m1-r { animation: rm-blink 4s ease-in-out infinite; transform-origin: center; }

.state-working #arm-m4-l, .state-working #arm-m1-l { animation: rm-type-l 0.55s ease-in-out infinite; transform-origin: 146px 336px; }
.state-working #arm-m4-r, .state-working #arm-m1-r { animation: rm-type-r 0.55s ease-in-out infinite; transform-origin: 214px 336px; }
.state-working #head-m4, .state-working #head-m1 { animation: rm-bob 1.2s ease-in-out infinite; transform-origin: center; }
.state-working #activity-m4-1, .state-working #activity-m4-2, .state-working #activity-m4-3 { animation: rm-pulse 0.7s ease-in-out infinite; }
.state-working #activity-m4-2 { animation-delay: .15s; }
.state-working #activity-m4-3 { animation-delay: .3s; }
.state-working #activity-m1-1, .state-working #activity-m1-2 { animation: rm-pulse 0.7s ease-in-out infinite; }
.state-working #activity-m1-2 { animation-delay: .2s; }
.state-working #steam-m1-1, .state-working #steam-m1-2 { animation: rm-steam 1.8s ease-out infinite; }
.state-working #steam-m1-2 { animation-delay: .7s; }

.state-error #head-m4, .state-error #head-m1 { animation: rm-shake 0.5s ease-in-out infinite; transform-origin: center; }
.state-error #eye-m4-l, .state-error #eye-m4-r,
.state-error #eye-m1-l, .state-error #eye-m1-r { animation: rm-pulse 0.5s ease-in-out infinite; transform-origin: center; }
.state-error #msg-m4, .state-error #msg-m1 { opacity: 1 !important; }

.state-offline #head-m4, .state-offline #head-m1 { opacity: 0.3; }
.state-offline #lamp-m4, .state-offline #lamp-m1 { opacity: 0.15; }

/* JEEP states */
.state-idle #horn-jeep { animation: rm-pulse 3s ease-in-out infinite; }
.state-idle #needle-jeep-l { animation: rm-needle 4s ease-in-out infinite; transform-origin: 94px 213px; }
.state-idle #needle-jeep-r { animation: rm-needle 4.3s ease-in-out infinite reverse; transform-origin: 266px 213px; }
.state-idle #head-jeep { animation: rm-bob 3.5s ease-in-out infinite; transform-origin: center; }

.state-working #needle-jeep-l { animation: rm-needle 1.4s ease-in-out infinite; transform-origin: 94px 213px; }
.state-working #needle-jeep-r { animation: rm-needle 1.2s ease-in-out infinite reverse; transform-origin: 266px 213px; }
.state-working #horn-jeep { animation: rm-pulse 0.6s ease-in-out infinite; }
.state-working #head-jeep { animation: rm-bob 1.5s ease-in-out infinite; transform-origin: center; }
.state-working #arm-jeep-r { animation: rm-steer 1.8s ease-in-out infinite; transform-origin: 200px 170px; }

.state-error #head-jeep { animation: rm-shake 0.4s ease-in-out infinite; transform-origin: center; }
.state-error #msg-jeep { opacity: 1 !important; }
.state-error #sig-jeep-1, .state-error #sig-jeep-2, .state-error #sig-jeep-3 { animation: rm-pulse 0.4s ease-in-out infinite; }

.state-offline #head-jeep { opacity: 0.3; }
.state-offline #needle-jeep-l, .state-offline #needle-jeep-r { opacity: 0.2; }
.state-offline #sig-jeep-1, .state-offline #sig-jeep-2, .state-offline #sig-jeep-3 { opacity: 0.1; }

/* weather overlays on JEEP */
.wx-rain-drop { animation: rm-rain 0.9s linear infinite; }
.wx-flash { animation: rm-flash 3s linear infinite; }
</style>
</head>

  <button class="ctrl-btn active" id="btn-auto">⟳ auto cycle</button>
  <button class="ctrl-btn" id="btn-faster">2× speed</button>
  <button class="ctrl-btn" id="btn-pause">⏸ pause</button>
  <span class="cycle-speed" id="cycle-label">cycling every 2s</span>
</div>

<script>
// ─── State definitions ───────────────────────────────────────────────────────
const STATES_STANDARD = ['idle', 'working', 'error', 'offline'];
const STATES_JEEP = ['idle', 'working', 'error', 'offline', 'clear', 'cloudy', 'rain', 'storm', 'fog'];

const STATUS_COLORS = {
  idle:    { fill: null,      label: '#6EE7B7' },
  working: { fill: '#FDE68A', label: '#FDE68A' },
  error:   { fill: '#F87171', label: '#F87171' },
  offline: { fill: '#333',    label: '#555'    },
  clear:   { fill: '#93C5FD', label: '#93C5FD' },
  cloudy:  { fill: '#CBD5E1', label: '#CBD5E1' },
  rain:    { fill: '#60A5FA', label: '#60A5FA' },
  storm:   { fill: '#C084FC', label: '#C084FC' },
  fog:     { fill: '#64748B', label: '#94A3B8' },
};

const LOGS = {
  idle:    ['→ heartbeat ping', '← 200 OK', '→ status: nominal', '← uptime: 99.98%'],
  working: ['→ task assigned', '← processing…', '→ chunk 4/8 complete', '← tokens: 1,204'],
  error:   ['✗ exception thrown', '← stack trace captured', '→ retry #1', '✗ still failing'],
  offline: ['⬡ connection lost', '— no response', '— last seen 0:04s ago', '— awaiting reconnect'],
  clear:   ['→ wx: CAVOK', '← visibility: 10km', '→ ceiling: unlimited', '← wind: 5kt N'],
  cloudy:  ['→ wx: BKN045', '← cloud cover: 6/8', '→ temp: 12°C', '← QNH: 1013'],
  rain:    ['→ wx: -RA', '← precip: 2.4mm/h', '→ visibility: 4km', '← runway: wet'],
  storm:   ['⚡ wx: TSRA', '← CB: embedded', '→ deviation requested', '← hold approved'],
  fog:     ['→ wx: FG', '← visibility: 200m', '→ RVR: 300m', '← CAT III approach'],
};

const WX_SKY_COLORS = {
  clear:  '#1A3A6A',
  cloudy: '#3A4A5A',
  rain:   '#2A3A4A',
  storm:  '#1A0A2A',
  fog:    '#4A4A4A',
  idle:   '#1A3A4A',
  working:'#1A3A4A',
  error:  '#2A1A1A',
  offline:'#0A0A0A',
};

// ─── GSAP animation timelines per room ───────────────────────────────────────
let tls = { m4: null, m1: null, jeep: null };
let currentStates = { m4: 'idle', m1: 'idle', jeep: 'idle' };
let wxTimers = {};

function killTl(room) {
  if (tls[room]) { tls[room].kill(); tls[room] = null; }
  if (wxTimers[room]) { clearTimeout(wxTimers[room]); wxTimers[room] = null; }
}

function getEl(id) { return document.getElementById(id); }

function setRoomState(room, state) {
  const prev = currentStates[room];
  if (prev === state) return;
  currentStates[room] = state;

  killTl(room);

  const suffix = room === 'jeep' ? '-jeep' : (room === 'm4' ? '-m4' : '-m1');
  const badge = getEl('badge-' + room);
  const logText = getEl('log-text-' + room);
  const dot = getEl('dot-' + room);
  const errFlash = getEl('err-flash' + suffix);
  const offOverlay = getEl('offline-overlay' + suffix);
  const statusEl = room === 'jeep' ? getEl('status-jeep') : getEl('status' + suffix);

  // update badge
  badge.textContent = state;
  badge.setAttribute('data-state', state);

  // update log
  const logPool = LOGS[state] || LOGS.idle;
  logText.textContent = logPool[Math.floor(Math.random() * logPool.length)];

  // dot color
  const sc = STATUS_COLORS[state];
  dot.style.background = sc.label;

  // status circle color
  if (statusEl) {
    const targetFill = sc.fill || (room === 'm4' ? '#F9A8D4' : room === 'm1' ? '#C4B5FD' : '#6EE7B7');
    gsap.to(statusEl, { duration: 0.4, attr: { fill: targetFill } });
  }

  // clear overlays
  gsap.set(errFlash, { opacity: 0 });
  gsap.set(offOverlay, { opacity: 0 });

  // restore opacities from previous offline/error
  if (room !== 'jeep') {
    const head = getEl('head-' + room);
    const lamp = getEl('lamp-' + room);
    if (head) gsap.to(head, { duration: 0.4, opacity: 1 });
    if (lamp) gsap.to(lamp, { duration: 0.4, opacity: 1 });
  } else {
    const headJ = getEl('head-jeep');
    const ndlL = getEl('needle-jeep-l');
    const ndlR = getEl('needle-jeep-r');
    if (headJ) gsap.to(headJ, { duration: 0.4, opacity: 1 });
    if (ndlL) gsap.to(ndlL, { duration: 0.4, opacity: 1 });
    if (ndlR) gsap.to(ndlR, { duration: 0.4, opacity: 1 });
  }

  // hide msg
  const msgEl = getEl('msg' + suffix);
  if (msgEl) gsap.to(msgEl, { duration: 0.2, opacity: 0 });

  // ── build GSAP timeline ──
  const tl = gsap.timeline({ repeat: -1 });
  tls[room] = tl;

  if (state === 'error') {
    // flash overlay + shake
    tl.to(errFlash, { duration: 0.08, opacity: 0.18, yoyo: true, repeat: -1, ease: 'none' });
    if (msgEl) gsap.to(msgEl, { duration: 0.3, opacity: 1, delay: 0.1 });
    // update log on each "cycle"
    startLogCycler(room, state);

  } else if (state === 'offline') {
    gsap.to(offOverlay, { duration: 0.6, opacity: 0.55 });
    startLogCycler(room, state);

  } else if (state === 'working') {
    if (room !== 'jeep') {
      // animate progress bars
      animateProgressBars(room, tl);
    } else {
      // fast needle sweep
      const ndlL = getEl('needle-jeep-l');
      const ndlR = getEl('needle-jeep-r');
      if (ndlL) tl.to(ndlL, { duration: 0.8, rotate: 30, transformOrigin: '94px 213px', yoyo: true, repeat: -1, ease: 'power1.inOut' }, 0);
      if (ndlR) tl.to(ndlR, { duration: 0.6, rotate: -25, transformOrigin: '266px 213px', yoyo: true, repeat: -1, ease: 'power1.inOut' }, 0);
    }
    startLogCycler(room, state);

  } else if (state === 'idle') {
    if (room !== 'jeep') {
      // gentle needle / bar drift
      const bars = room === 'm4'
        ? ['bar-m4-1a','bar-m4-1b','bar-m4-1c','bar-m4-1d','bar-m4-1e','bar-m4-1f']
        : [];
      bars.forEach((id, i) => {
        const el = getEl(id);
        if (el) tl.to(el, { duration: 1.2 + i * 0.15, scaleY: 0.4 + Math.random() * 0.9, transformOrigin: 'bottom', yoyo: true, repeat: -1, ease: 'sine.inOut' }, i * 0.1);
      });
    } else {
      const ndlL = getEl('needle-jeep-l');
      const ndlR = getEl('needle-jeep-r');
      if (ndlL) tl.to(ndlL, { duration: 2.5, rotate: 8, transformOrigin: '94px 213px', yoyo: true, repeat: -1, ease: 'sine.inOut' }, 0);
      if (ndlR) tl.to(ndlR, { duration: 2.8, rotate: -8, transformOrigin: '266px 213px', yoyo: true, repeat: -1, ease: 'sine.inOut' }, 0);
    }
    startLogCycler(room, state);
  }

  // JEEP weather sky tint
  if (room === 'jeep') {
    applyWeatherFx(state, tl);
  }
}

function animateProgressBars(room, tl) {
  const ids = room === 'm4'
    ? ['prog-m4-2a','prog-m4-2b','prog-m4-2c','prog-m4-3a','prog-m4-3b','prog-m4-3c']
    : ['prog-m1-2a','prog-m1-2b','prog-m1-2c','prog-m1-3a','prog-m1-3b','prog-m1-3c'];
  ids.forEach((id, i) => {
    const el = getEl(id);
    if (!el) return;
    const maxW = 72;
    tl.to(el, {
      duration: 1.5 + Math.random(),
      attr: { width: 10 + Math.random() * maxW },
      yoyo: true, repeat: -1, ease: 'power1.inOut',
      delay: i * 0.18
    }, i * 0.15);
  });
}

// weather FX on JEEP window
function applyWeatherFx(state, tl) {
  const sky = getEl('wx-sky-jeep');
  const overlay = getEl('wx-overlay-jeep');
  if (!sky || !overlay) return;

  // clear existing weather elements
  while (overlay.firstChild) overlay.removeChild(overlay.firstChild);

  const col = WX_SKY_COLORS[state] || '#1A3A4A';
  gsap.to(sky, { duration: 0.6, attr: { fill: col } });

  const ns = 'http://www.w3.org/2000/svg';

  if (state === 'rain' || state === 'storm') {
    // rain drops
    for (let i = 0; i < 14; i++) {
      const line = document.createElementNS(ns, 'line');
      const x = 48 + Math.random() * 268;
      const y = 20 + Math.random() * 80;
      line.setAttribute('x1', x); line.setAttribute('y1', y);
      line.setAttribute('x2', x - 2); line.setAttribute('y2', y + 10);
      line.setAttribute('stroke', state === 'storm' ? '#C084FC' : '#93C5FD');
      line.setAttribute('stroke-width', '1.5');
      line.setAttribute('opacity', '0.7');
      overlay.appendChild(line);
      tl.to(line, {
        duration: 0.5 + Math.random() * 0.4,
        attr: { y1: y + 50, y2: y + 60 },
        opacity: 0,
        repeat: -1,
        ease: 'none',
        delay: Math.random() * 0.8
      }, 0);
    }
  }

  if (state === 'storm') {
    // lightning bolt
    const bolt = document.createElementNS(ns, 'polyline');
    bolt.setAttribute('points', '190,22 183,42 190,42 183,62');
    bolt.setAttribute('stroke', '#FDE68A');
    bolt.setAttribute('stroke-width', '3');
    bolt.setAttribute('fill', 'none');
    bolt.setAttribute('opacity', '0');
    overlay.appendChild(bolt);
    tl.to(bolt, { duration: 0.08, opacity: 1, yoyo: true, repeat: -1, repeatDelay: 2.2, ease: 'none' }, 0.3);
  }

  if (state === 'fog') {
    // fog bands
    for (let i = 0; i < 4; i++) {
      const rect = document.createElementNS(ns, 'rect');
      const y = 30 + i * 22;
      rect.setAttribute('x', '44'); rect.setAttribute('y', y);
      rect.setAttribute('width', '272'); rect.setAttribute('height', '12');
      rect.setAttribute('rx', '6');
      rect.setAttribute('fill', '#94A3B8');
      rect.setAttribute('opacity', '0.18');
      overlay.appendChild(rect);
      tl.to(rect, {
        duration: 2.5 + i * 0.4,
        x: -10 + Math.random() * 20,
        opacity: 0.08 + Math.random() * 0.18,
        yoyo: true, repeat: -1, ease: 'sine.inOut',
        delay: i * 0.3
      }, 0);
    }
  }

  if (state === 'cloudy') {
    // cloud puffs
    for (let i = 0; i < 3; i++) {
      const cx = 100 + i * 80;
      const cy = 45;
      const c = document.createElementNS(ns, 'circle');
      c.setAttribute('cx', cx); c.setAttribute('cy', cy); c.setAttribute('r', 18);
      c.setAttribute('fill', '#CBD5E1'); c.setAttribute('opacity', '0.35');
      overlay.appendChild(c);
      tl.to(c, { duration: 3 + i, x: 5, yoyo: true, repeat: -1, ease: 'sine.inOut', delay: i * 0.5 }, 0);
    }
  }

  if (state === 'clear') {
    // sun
    const sun = document.createElementNS(ns, 'circle');
    sun.setAttribute('cx', '220'); sun.setAttribute('cy', '38'); sun.setAttribute('r', '14');
    sun.setAttribute('fill', '#FDE68A'); sun.setAttribute('opacity', '0.55');
    overlay.appendChild(sun);
    tl.to(sun, { duration: 3, opacity: 0.7, r: 15, attr: { r: 15 }, yoyo: true, repeat: -1, ease: 'sine.inOut' }, 0);
  }
}

// ─── Log cycler ──────────────────────────────────────────────────────────────
let logIntervals = {};
function startLogCycler(room, state) {
  clearInterval(logIntervals[room]);
  logIntervals[room] = setInterval(() => {
    const logText = getEl('log-text-' + room);
    const pool = LOGS[currentStates[room]] || LOGS.idle;
    logText.style.opacity = 0;
    setTimeout(() => {
      logText.textContent = pool[Math.floor(Math.random() * pool.length)];
      logText.style.transition = 'opacity 0.3s';
      logText.style.opacity = 1;
    }, 160);
  }, 1800);
}

// ─── Mock cycler ─────────────────────────────────────────────────────────────
let cycleInterval = null;
let cycleSpeed = 2000;
let paused = false;

function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function runCycle() {
  setRoomState('m4',   pickRandom(STATES_STANDARD));
  setRoomState('m1',   pickRandom(STATES_STANDARD));
  setRoomState('jeep', pickRandom(STATES_JEEP));
}

function startCycler(ms) {
  clearInterval(cycleInterval);
  cycleSpeed = ms;
  cycleInterval = setInterval(runCycle, ms);
  document.getElementById('cycle-label').textContent = `cycling every ${ms >= 1000 ? ms/1000 + 's' : ms + 'ms'}`;
}

// controls
document.getElementById('btn-auto').addEventListener('click', () => {
  paused = false;
  document.getElementById('btn-pause').textContent = '⏸ pause';
  startCycler(2000);
  document.getElementById('btn-faster').classList.remove('active');
  document.getElementById('btn-auto').classList.add('active');
});

document.getElementById('btn-faster').addEventListener('click', function() {
  paused = false;
  document.getElementById('btn-pause').textContent = '⏸ pause';
  const fast = !this.classList.contains('active');
  this.classList.toggle('active', fast);
  document.getElementById('btn-auto').classList.toggle('active', !fast);
  startCycler(fast ? 800 : 2000);
});

document.getElementById('btn-pause').addEventListener('click', function() {
  paused = !paused;
  if (paused) {
    clearInterval(cycleInterval);
    this.textContent = '▶ resume';
    document.getElementById('cycle-label').textContent = 'paused';
    document.getElementById('btn-auto').classList.remove('active');
  } else {
    this.textContent = '⏸ pause';
    startCycler(cycleSpeed);
    document.getElementById('btn-auto').classList.add('active');
  }
});

// ─── Init ────────────────────────────────────────────────────────────────────
setRoomState('m4',   'idle');
setRoomState('m1',   'working');
setRoomState('jeep', 'clear');

setTimeout(() => startCycler(2000), 500);
</script>
</body>
</html>
